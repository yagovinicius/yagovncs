name: Generate Profile Stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: profile-stats
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Generate static stats SVG
        uses: cicirello/user-statistician@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-file: assets/userstats.svg
          colors: dark-dimmed
          custom-title: "Yago Vinicius - Performance"
          commit-and-push: false 

      - name: Commit updated SVG (Solução Anti-Conflito do Copilot)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/userstats.svg
          git diff --cached --quiet || (git pull --rebase origin main && git commit -m "chore: update profile stats" && git push)
